<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D 旋转元素周期表</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#0a0a1a;font-family:'Inter','Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:#fff;user-select:none}
#canvas-container{width:100vw;height:100vh;display:block}

#title-bar{
position:fixed;top:28px;left:50%;transform:translateX(-50%);
text-align:center;z-index:10;pointer-events:none;
}
#title-bar h1{
font-size:22px;font-weight:500;letter-spacing:6px;
background:linear-gradient(135deg,#a8b8ff,#7c8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
text-shadow:0 0 40px rgba(124,140,255,.15);
}
#title-bar p{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:4px}
#title-bar .hint{font-size:11px;color:rgba(255,255,255,.2);margin-top:8px;letter-spacing:1px}

#info-panel{
position:fixed;right:32px;top:50%;transform:translateY(-50%);
width:200px;background:rgba(255,255,255,.04);backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.06);border-radius:16px;
padding:24px;z-index:10;opacity:0;transition:opacity .4s ease,transform .4s ease;
transform:translateY(-50%) translateX(20px);pointer-events:none;
}
#info-panel.visible{opacity:1;transform:translateY(-50%) translateX(0);pointer-events:auto}
#info-panel .symbol{font-size:48px;font-weight:600;line-height:1;letter-spacing:-2px}
#info-panel .name{font-size:16px;color:rgba(255,255,255,.6);margin-top:4px}
#info-panel .number{font-size:13px;color:rgba(255,255,255,.3);margin-top:2px}
#info-panel .detail{font-size:12px;color:rgba(255,255,255,.4);margin-top:12px;line-height:1.6}
#info-panel .detail span{color:rgba(255,255,255,.6)}
#info-panel .category-badge{
display:inline-block;padding:3px 10px;border-radius:20px;
font-size:11px;margin-top:12px;letter-spacing:1px;
}
#info-panel .divider{height:1px;background:rgba(255,255,255,.06);margin:14px 0}
#info-panel .sub-info{font-size:12px;color:rgba(255,255,255,.3);line-height:1.8}

#legend{
position:fixed;left:28px;bottom:28px;z-index:10;
background:rgba(255,255,255,.03);backdrop-filter:blur(12px);
-webkit-backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.05);border-radius:12px;
padding:14px 18px;display:flex;flex-wrap:wrap;gap:6px 12px;max-width:400px;
}
#legend .item{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5);letter-spacing:.5px}
#legend .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

#controls{
position:fixed;right:28px;bottom:28px;z-index:10;
display:flex;gap:8px;
}
#controls button{
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
color:rgba(255,255,255,.6);border-radius:10px;padding:8px 14px;
font-size:12px;cursor:pointer;transition:all .25s;letter-spacing:.5px;font-family:inherit;
}
#controls button:hover{background:rgba(255,255,255,.12);color:#fff}
#controls button.active{background:rgba(124,140,255,.2);border-color:rgba(124,140,255,.3);color:#a8b8ff}

@media(max-width:768px){
#info-panel{right:16px;width:170px;padding:18px}
#info-panel .symbol{font-size:36px}
#title-bar h1{font-size:17px;letter-spacing:4px}
#legend{left:16px;bottom:16px;padding:10px 14px;max-width:300px}
#legend .item{font-size:10px}
#controls{right:16px;bottom:16px}
#controls button{padding:6px 10px;font-size:11px}
}
</style>
</head>

{s:110,n:"𫟼",sym:"Ds",p:7,g:10,cat:"transition",m:281.00,el:"[Rn]5f¹⁴6d⁸7s²",neg:0},
{s:111,n:"𬬭",sym:"Rg",p:7,g:11,cat:"transition",m:282.00,el:"[Rn]5f¹⁴6d⁹7s²",neg:0},
{s:112,n:"鎶",sym:"Cn",p:7,g:12,cat:"transition",m:285.00,el:"[Rn]5f¹⁴6d¹⁰7s²",neg:0},
{s:113,n:"鉨",sym:"Nh",p:7,g:13,cat:"post-transition",m:286.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p¹",neg:0},
{s:114,n:"𫓧",sym:"Fl",p:7,g:14,cat:"post-transition",m:289.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p²",neg:0},
{s:115,n:"镆",sym:"Mc",p:7,g:15,cat:"post-transition",m:290.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p³",neg:0},
{s:116,n:"𫟷",sym:"Lv",p:7,g:16,cat:"post-transition",m:293.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p⁴",neg:0},
{s:117,n:"鿬",sym:"Ts",p:7,g:17,cat:"halogen",m:294.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p⁵",neg:0},
{s:118,n:"鿫",sym:"Og",p:7,g:18,cat:"noble-gas",m:294.00,el:"[Rn]5f¹⁴6d¹⁰7s²7p⁶",neg:0}
];

// ─── Category Colors ────────────────────────────────────────────
const CAT_COLORS = {
'nonmetal':       [76,175,80],
'noble-gas':      [156,39,176],
'alkali-metal':   [233,30,99],
'alkaline-earth': [255,87,34],
'metalloid':      [255,152,0],
'halogen':        [0,188,212],
'post-transition':[63,81,181],
'transition':     [255,193,7],
'lanthanide':     [139,195,74],
'actinide':       [121,85,72]
};
const CAT_NAMES = {
'nonmetal':'非金属','noble-gas':'稀有气体','alkali-metal':'碱金属','alkaline-earth':'碱土金属',
'metalloid':'类金属','halogen':'卤素','post-transition':'贫金属','transition':'过渡金属',
'lanthanide':'镧系','actinide':'锕系'
};

// ─── Scene Setup ────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 100);
camera.position.set(18,12,22);
camera.lookAt(0,0,0);

const renderer = new THREE.WebGLRenderer({
antialias:true,alpha:true,powerPreference:"high-performance"
});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
container.appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.minDistance=10;
controls.maxDistance=50;
controls.autoRotate=true;
controls.autoRotateSpeed=1.2;
controls.target.set(0,0,0);
controls.update();

// ─── Lights ─────────────────────────────────────────────────────
const ambientLight = new THREE.AmbientLight(0x222244,0.6);
scene.add(ambientLight);

const envLight = new THREE.DirectionalLight(0x8888ff,0.4);
envLight.position.set(-10,15,-10);
scene.add(envLight);

const mainLight = new THREE.DirectionalLight(0xffffff,2.2);
mainLight.position.set(15,25,10);
mainLight.castShadow=true;
mainLight.shadow.mapSize.width=1024;
mainLight.shadow.mapSize.height=1024;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x4488ff,0.6);
fillLight.position.set(-10,0,-15);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x88aaff,0.8);
rimLight.position.set(0,-15,5);
scene.add(rimLight);

// ─── Stars Background ───────────────────────────────────────────
const starsGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount*3);
const starSizes = new Float32Array(starCount);
for(let i=0;i<starCount;i++){
starPos[i*3]=(Math.random()-0.5)*200;
starPos[i*3+1]=(Math.random()-0.5)*200;
starPos[i*3+2]=(Math.random()-0.5)*200;
starSizes[i]=Math.random()*1.5+0.3;
}
starsGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
starsGeo.setAttribute('size',new THREE.BufferAttribute(starSizes,1));
const starMat = new THREE.PointsMaterial({
color:0xffffff,size:0.25,transparent:true,opacity:0.6,
sizeAttenuation:true,blending:THREE.AdditiveBlending
});
scene.add(new THREE.Points(starsGeo,starMat));

// ─── Create Element Cards ──────────────────────────────────────
let elementsGroup = new THREE.Group();
scene.add(elementsGroup);
let elementMeshes = [];

function createElementCard(el, angle, y, radius, scale=1) {
const c = CAT_COLORS[el.cat]||[100,100,100];
const col = `rgb(${c[0]},${c[1]},${c[2]})`;
const colLight = `rgb(${Math.min(255,c[0]+60)},${Math.min(255,c[1]+60)},${Math.min(255,c[2]+60)})`;
const colDark = `rgb(${Math.max(0,c[0]-40)},${Math.max(0,c[1]-40)},${Math.max(0,c[2]-40)})`;

const canvas = document.createElement('canvas');
canvas.width=256;
canvas.height=180;
const ctx=canvas.getContext('2d');

// background
const grad=ctx.createLinearGradient(0,0,256,180);
grad.addColorStop(0,colDark);
grad.addColorStop(0.5,col);
grad.addColorStop(1,colDark);
ctx.fillStyle=grad;
ctx.beginPath();
ctx.roundRect(8,8,240,164,14);
ctx.fill();

// border glow
ctx.shadowColor='rgba(255,255,255,0.08)';
ctx.shadowBlur=20;
ctx.strokeStyle='rgba(255,255,255,0.12)';
ctx.lineWidth=1.5;
ctx.beginPath();
ctx.roundRect(8,8,240,164,14);
ctx.stroke();
ctx.shadowBlur=0;

// atomic number
ctx.fillStyle='rgba(255,255,255,0.35)';
ctx.font='500 22px "Inter","Segoe UI",sans-serif';
ctx.textAlign='left';
ctx.textBaseline='top';
ctx.fillText(el.s,18,18);

// symbol
ctx.fillStyle='#fff';
ctx.font='600 72px "Inter","Segoe UI",sans-serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.shadowColor='rgba(0,0,0,0.3)';
ctx.shadowBlur=8;
ctx.fillText(el.sym,128,86);
ctx.shadowBlur=0;

// name
ctx.fillStyle='rgba(255,255,255,0.7)';
ctx.font='400 20px "PingFang SC","Microsoft YaHei","Inter",sans-serif';
ctx.textAlign='center';
ctx.textBaseline='bottom';
ctx.fillText(el.n,128,156);

// mass (tiny)
ctx.fillStyle='rgba(255,255,255,0.25)';
ctx.font='400 12px "Inter","Segoe UI",sans-serif';
ctx.textAlign='right';
ctx.textBaseline='bottom';
ctx.fillText(el.m.toFixed(2),236,156);

const texture=new THREE.CanvasTexture(canvas);
texture.needsUpdate=true;

const geo=new THREE.PlaneGeometry(1.6*scale,1.12*scale);
const mat=new THREE.MeshStandardMaterial({
map:texture,transparent:true,
side:THREE.FrontSide,
roughness:0.3,metalness:0.1,
emissive:new THREE.Color(`rgb(${c[0]/6},${c[1]/6},${c[2]/6})`),
emissiveIntensity:0.15
});
const mesh=new THREE.Mesh(geo,mat);
const px=radius*Math.cos(angle);
const pz=radius*Math.sin(angle);
mesh.position.set(px,y,pz);
mesh.lookAt(px*2,y,pz*2);
mesh.userData={el,baseScale:scale,baseY:y,baseRadius:radius,baseAngle:angle};
return mesh;
}

const PERIOD_COUNTS = [0,2,8,8,18,18,32,32];
const PERIOD_HEIGHTS = [0, -5.4, -3.6, -1.8, 0, 1.8, 3.6, 5.4];
const BASE_RADIUS = 7.5;

function buildCylindricalLayout() {
while(elementsGroup.children.length)elementsGroup.remove(elementsGroup.children[0]);
elementMeshes=[];

ELEMENTS.forEach(el=>{
const period=el.p;
const count=PERIOD_COUNTS[period];
const idx=ELEMENTS.filter(e=>e.p===period).indexOf(el);
const angle=(idx/count)*Math.PI*2;
const y=PERIOD_HEIGHTS[period];
const mesh=createElementCard(el,angle,y,BASE_RADIUS);
elementsGroup.add(mesh);
elementMeshes.push(mesh);
});
}

function buildSpiralLayout() {
while(elementsGroup.children.length)elementsGroup.remove(elementsGroup.children[0]);
elementMeshes=[];

ELEMENTS.forEach((el,i)=>{
const t=i/(ELEMENTS.length-1);
const angle=t*Math.PI*8;
const y=(t-0.5)*12;
const radius=4+t*5;
const mesh=createElementCard(el,angle,y,radius,0.85);
const p=mesh.position;
mesh.lookAt(p.x*2,p.y,p.z*2);
elementsGroup.add(mesh);
elementMeshes.push(mesh);
});
}

let currentLayout='cylindrical';
buildCylindricalLayout();

// ─── Ground Ring ────────────────────────────────────────────────
const ringGeo=new THREE.TorusGeometry(BASE_RADIUS+0.4,0.03,8,64);
const ringMat=new THREE.MeshStandardMaterial({
color:0x4466aa,transparent:true,opacity:0.15,emissive:0x4466aa,emissiveIntensity:0.1
});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.rotation.x=Math.PI/2;
ring.position.y=PERIOD_HEIGHTS[1]-0.8;
scene.add(ring);

const ring2=ring.clone();
ring2.position.y=PERIOD_HEIGHTS[7]+0.8;
scene.add(ring2);

// vertical glow lines
for(let i=0;i<12;i++){
const a=(i/12)*Math.PI*2;
const pts=[];
for(let j=0;j<=40;j++){
const t=j/40;
const y=PERIOD_HEIGHTS[1]-0.8+t*(PERIOD_HEIGHTS[7]-PERIOD_HEIGHTS[1]+1.6);
pts.push(new THREE.Vector3(BASE_RADIUS*Math.cos(a),y,BASE_RADIUS*Math.sin(a)));
}
const lineGeo=new THREE.BufferGeometry().setFromPoints(pts);
const lineMat=new THREE.LineBasicMaterial({
color:0x4466aa,transparent:true,opacity:0.04
});
scene.add(new THREE.Line(lineGeo,lineMat));
}

// ─── Legend ────────────────────────────────────────────────────
const legendEl=document.getElementById('legend');
Object.entries(CAT_NAMES).forEach(([key,name])=>{
const c=CAT_COLORS[key];
const item=document.createElement('div');
item.className='item';
item.innerHTML=`<span class="dot" style="background:rgb(${c[0]},${c[1]},${c[2]})"></span>${name}`;
legendEl.appendChild(item);
});

// ─── Raycaster ─────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const pointer=new THREE.Vector2();
let hovered=null;

function getIntersects(event){
const rect=renderer.domElement.getBoundingClientRect();
pointer.x=((event.clientX-rect.left)/rect.width)*2-1;
pointer.y=-((event.clientY-rect.top)/rect.height)*2+1;
raycaster.setFromCamera(pointer,camera);
return raycaster.intersectObjects(elementMeshes);
}

function showInfo(el){
const panel=document.getElementById('info-panel');
panel.classList.add('visible');
document.getElementById('el-symbol').textContent=el.sym;
document.getElementById('el-name').textContent=el.n;
document.getElementById('el-number').textContent=`原子序数 ${el.s}`;
document.getElementById('el-detail').innerHTML=
`相对原子质量 <span>${el.m.toFixed(2)}</span><br>电子构型 <span>${el.el}</span>${el.neg?`<br>电负性 <span>${el.neg.toFixed(2)}</span>`:''}`;
document.getElementById('el-sub').innerHTML=
`周期 <span>${el.p}</span> · 族 <span>${el.g}</span>`;
const badge=document.getElementById('el-category');
const c=CAT_COLORS[el.cat];
badge.textContent=CAT_NAMES[el.cat];
badge.style.background=`rgba(${c[0]},${c[1]},${c[2]},0.2)`;
badge.style.color=`rgb(${c[0]},${c[1]},${c[2]})`;
}

function hideInfo(){
document.getElementById('info-panel').classList.remove('visible');
}

renderer.domElement.addEventListener('pointermove',(event)=>{
const hits=getIntersects(event);
if(hits.length>0){
const mesh=hits[0].object;
if(mesh!==hovered){
if(hovered){
const ud=hovered.userData;
hovered.position.set(ud.baseRadius*Math.cos(ud.baseAngle),ud.baseY,ud.baseRadius*Math.sin(ud.baseAngle));
hovered.scale.set(1,1,1);
}
hovered=mesh;
const ud=mesh.userData;
const yOffset=0.15;
mesh.position.set(ud.baseRadius*Math.cos(ud.baseAngle),ud.baseY+yOffset,ud.baseRadius*Math.sin(ud.baseAngle));
mesh.scale.set(1.18,1.18,1.18);
showInfo(ud.el);
}
}else{
if(hovered){
const ud=hovered.userData;
hovered.position.set(ud.baseRadius*Math.cos(ud.baseAngle),ud.baseY,ud.baseRadius*Math.sin(ud.baseAngle));
hovered.scale.set(1,1,1);
hovered=null;
hideInfo();
}
}
});

// ─── Controls ──────────────────────────────────────────────────
document.getElementById('btn-rotate').addEventListener('click',()=>{
controls.autoRotate=!controls.autoRotate;
document.getElementById('btn-rotate').classList.toggle('active');
document.getElementById('btn-rotate').textContent=controls.autoRotate?'旋转':'暂停';
});

document.getElementById('btn-spiral').addEventListener('click',()=>{
if(currentLayout==='cylindrical'){
currentLayout='spiral';
document.getElementById('btn-spiral').textContent='柱形';
buildSpiralLayout();
}else{
currentLayout='cylindrical';
document.getElementById('btn-spiral').textContent='螺旋';
buildCylindricalLayout();
}
hideInfo();hovered=null;
});

document.getElementById('btn-reset').addEventListener('click',()=>{
camera.position.set(18,12,22);
controls.target.set(0,0,0);
controls.update();
});

// ─── Resize ────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

// ─── Animate ───────────────────────────────────────────────────
function animate(){
requestAnimationFrame(animate);
controls.update();

// subtle floating for hovered element
if(hovered){
const ud=hovered.userData;
const floatY=ud.baseY+0.15+Math.sin(Date.now()*0.003)*0.05;
hovered.position.y=floatY;
}

renderer.render(scene,camera);
}
animate();

// finally, show info for first element
setTimeout(()=>showInfo(ELEMENTS[0]),600);

console.log('3D Periodic Table ready — 118 elements');
</script>
</body>
</html>
