<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪 · 中世纪诗篇</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #08081a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Songti SC', 'SimSun', 'Noto Serif SC', 'STSong', serif;
    overflow: hidden;
    position: relative;
  }

  /* ─── 雪花 Canvas ─── */
  #snow-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  /* ─── 星空背景 ─── */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(30, 60, 120, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(60, 30, 80, 0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(10, 10, 30, 0.5) 0%, #08081a 100%);
    z-index: 0;
  }

  /* ─── 手稿容器 ─── */
  .manuscript-container {
    position: relative;
    z-index: 2;
    width: min(780px, 92vw);
    padding: 18px;
    animation: reveal 2s ease-out both;
  }

  @keyframes reveal {
    0% { opacity: 0; transform: translateY(30px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ─── 外框 ─── */
  .manuscript-frame {
    position: relative;
    background: #1a1208;
    padding: 16px;
    border-radius: 2px;
    box-shadow:
      0 0 0 2px #4a3800,
      0 0 0 4px #8B6914,
      0 0 0 6px #3a2a00,
      inset 0 0 0 2px #C9A84C,
      inset 0 0 0 4px #5a4200,
      0 30px 80px rgba(0,0,0,0.7);
    animation: frameGlow 6s ease-in-out infinite alternate;
  }

  @keyframes frameGlow {
    0%   { box-shadow: 0 0 0 2px #4a3800, 0 0 0 4px #8B6914, 0 0 0 6px #3a2a00, inset 0 0 0 2px #C9A84C, inset 0 0 0 4px #5a4200, 0 30px 80px rgba(0,0,0,0.7); }
    100% { box-shadow: 0 0 0 2px #5a4800, 0 0 0 4px #a07818, 0 0 0 6px #4a3a00, inset 0 0 0 2px #d4b04a, inset 0 0 0 4px #6a5200, 0 30px 100px rgba(0,0,0,0.8); }
  }

  /* ─── 四角装饰 ─── */
  .manuscript-frame::before,
  .manuscript-frame::after {
    content: '';
    position: absolute;
    width: 40px; height: 40px;
    border: 2px solid #C9A84C;
    opacity: 0.6;
  }
  .manuscript-frame::before {
    top: 10px; left: 10px;
    border-right: none; border-bottom: none;
  }
  .manuscript-frame::after {
    top: 10px; right: 10px;
    border-left: none; border-bottom: none;
  }

  .corner-bl,
  .corner-br {
    position: absolute;
    width: 40px; height: 40px;
    border: 2px solid #C9A84C;
    opacity: 0.6;
    z-index: 1;
  }
  .corner-bl {
    bottom: 10px; left: 10px;
    border-right: none; border-top: none;
  }
  .corner-br {
    bottom: 10px; right: 10px;
    border-left: none; border-top: none;
  }

  /* ─── 内页 ─── */
  .manuscript-page {
    position: relative;
    background:
      linear-gradient(135deg, #f5e8d0 0%, #f0dcc0 30%, #edd8b8 60%, #f2e0c8 100%);
    padding: 48px 44px 40px;
    min-height: 520px;
    overflow: hidden;
  }

  /* 羊皮纸纹理 */
  .manuscript-page::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(139, 90, 43, 0.015) 2px,
        rgba(139, 90, 43, 0.015) 3px
      ),
      radial-gradient(ellipse at 30% 20%, rgba(200, 160, 100, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(180, 140, 80, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ─── 烛光动画 ─── */
  .manuscript-page::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255, 200, 100, 0.04) 0%, transparent 60%);
    animation: candleFlicker 4s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 1;
  }

  @keyframes candleFlicker {
    0%   { opacity: 0.5; }
    50%  { opacity: 1; }
    100% { opacity: 0.6; }
  }

  /* ─── 内容区域 ─── */
  .page-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── 标题 ─── */
  .title-latin {
    font-family: 'Times New Roman', 'Georgia', serif;
    font-size: clamp(11px, 1.4vw, 16px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: #6a5020;
    margin-bottom: 4px;
    font-style: italic;
    text-align: center;
  }
  .title-latin::before,
  .title-latin::after {
    content: ' ❧ ';
    color: #C9A84C;
  }

  .title-chinese {
    font-size: clamp(28px, 4vw, 42px);
    font-weight: 400;
    color: #2c1810;
    letter-spacing: 0.6em;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
  }
  .title-chinese::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A84C, transparent);
    margin: 12px auto 0;
  }

  /* ─── 装饰分隔线 ─── */
  .ornament-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    margin: 8px 0 20px;
    color: #C9A84C;
    font-size: 14px;
  }
  .ornament-line .line {
    flex: 1;
    height: 1px;
    max-width: 80px;
    background: linear-gradient(90deg, transparent, #c9a84c88, transparent);
  }
  .ornament-line .diamond { font-size: 8px; color: #C9A84C; }

  /* ─── 诗歌 ─── */
  .poem {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 520px;
    position: relative;
  }

  .poem-verse {
    display: flex;
    align-items: flex-start;
    width: 100%;
    margin-bottom: 6px;
  }

  /* 首字装饰 */
  .illuminated-initial {
    float: left;
    font-size: 64px;
    line-height: 0.85;
    font-weight: 400;
    color: #8B6914;
    text-shadow:
      0 0 4px rgba(201, 168, 76, 0.3),
      1px 1px 0 #5a4200;
    margin: 0 12px 0 0;
    padding: 4px 8px 0 0;
    font-family: 'Songti SC', 'SimSun', 'Noto Serif SC', serif;
    position: relative;
  }
  .illuminated-initial::after {
    content: '';
    position: absolute;
    bottom: 2px; left: 0;
    width: 100%; height: 1px;
    background: #C9A84C;
    opacity: 0.4;
  }

  .poem-text {
    font-size: clamp(16px, 2.2vw, 22px);
    line-height: 2;
    color: #2c1810;
    letter-spacing: 0.15em;
    text-align: center;
    /* 竖排右起效果 —— 视觉上模仿古籍 */
    writing-mode: horizontal-tb;
  }

  .poem-line {
    white-space: nowrap;
    display: block;
    text-align: center;
    position: relative;
    padding: 1px 0;
  }
  .poem-line:not(.first-line) {
    padding-left: 30px;
  }

  /* 给每一行加金色小点装饰 */
  .poem-line::before {
    content: '✦';
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: #C9A84C;
    font-size: 6px;
    opacity: 0.5;
  }
  .poem-line.first-line::before {
    display: none;
  }

  /* ─── 箴言 / 副文 ─── */
  .colophon {
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid rgba(201, 168, 76, 0.3);
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .colophon-text {
    font-size: clamp(13px, 1.6vw, 16px);
    color: #5a4020;
    letter-spacing: 0.25em;
    font-style: italic;
    text-align: center;
  }

  .colophon-seal {
    display: inline-block;
    border: 2px solid #8B0000;
    color: #8B0000;
    padding: 4px 12px;
    font-size: clamp(12px, 1.4vw, 14px);
    letter-spacing: 0.2em;
    transform: rotate(-2deg);
    opacity: 0.75;
    font-family: 'Times New Roman', serif;
  }

  /* ─── 底部拉丁箴言 ─── */
  .motto {
    margin-top: 16px;
    font-family: 'Times New Roman', 'Georgia', serif;
    font-size: clamp(11px, 1.2vw, 14px);
    color: #8B6914;
    letter-spacing: 0.15em;
    text-align: center;
    font-style: italic;
    opacity: 0.6;
  }

  .motto::before,
  .motto::after {
    content: ' ✦ ';
    color: #C9A84C;
    font-size: 8px;
  }

  /* ─── 响应式 ─── */
  @media (max-width: 600px) {
    .manuscript-container { padding: 10px; }
    .manuscript-frame { padding: 10px; }
    .manuscript-page { padding: 28px 20px 24px; }
    .illuminated-initial { font-size: 48px; }
    .poem-line:not(.first-line) { padding-left: 22px; }
    .poem-line::before { left: 4px; }
  }

  @media (max-width: 420px) {
    .manuscript-page { padding: 20px 14px 18px; }
    .illuminated-initial { font-size: 40px; margin-right: 8px; }
    .title-chinese { letter-spacing: 0.3em; }
  }
</style>
</head>
<body>

<!-- 雪花 Canvas -->
<canvas id="snow-canvas"></canvas>

<!-- 四角装饰（放在框架外层） -->
<div class="corner-bl"></div>
<div class="corner-br"></div>

<!-- 手稿主体 -->
<div class="manuscript-container">
  <div class="manuscript-frame">
    <div class="manuscript-page">
      <div class="page-content">

        <!-- 标题 -->
        <div class="title-latin">❧  Carmen Nivis  ❧</div>
        <div class="title-chinese">雪 之 诗</div>

        <div class="ornament-line">
          <span class="line"></span>
          <span class="diamond">◇</span>
          <span class="diamond">✦</span>
          <span class="diamond">◇</span>
          <span class="line"></span>
        </div>

        <!-- 诗歌 -->
        <div class="poem">
          <div class="poem-verse">
            <div class="poem-text">
              <span class="illuminated-initial">凛</span>
              <span class="poem-line first-line">冬夜雪覆千山</span>
              <span class="poem-line">寒魄幽光映九寰</span>
              <span class="poem-line">金炉火暖残灯在</span>
              <span class="poem-line">独坐观书万虑闲</span>
              <span class="poem-line">天地苍茫归一色</span>
              <span class="poem-line">古今浩荡入微澜</span>
              <span class="poem-line">此身已化无穷境</span>
              <span class="poem-line">片雪飞来落素笺</span>
            </div>
          </div>
        </div>

        <!-- 尾注 -->
        <div class="colophon">
          <div class="colophon-text">—— 夜坐观雪，寂然成咏 ——</div>
          <div class="colophon-seal">雪 隐</div>
        </div>

        <div class="motto">Nix cadit, mundus silet</div>

      </div><!-- /page-content -->
    </div><!-- /manuscript-page -->
  </div><!-- /manuscript-frame -->
</div><!-- /manuscript-container -->

<script>
(function() {
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');

  let W, H;
  let flakes = [];
  const SNOW_COUNT = 130;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  /* ─── 雪花类 ─── */
  class Flake {
    constructor() {
      this.reset(true);
    }
    reset(initial) {
      this.x = Math.random() * W;
      this.y = initial ? Math.random() * H : -10 - Math.random() * 50;
      this.size = 1.5 + Math.random() * 4.5;
      this.speedY = 0.4 + Math.random() * 1.2;
      this.speedX = (Math.random() - 0.5) * 0.15;
      this.opacity = 0.3 + Math.random() * 0.6;
      this.rotation = Math.random() * Math.PI * 2;
      this.rotSpeed = (Math.random() - 0.5) * 0.02;
      this.windPhase = Math.random() * Math.PI * 2;
      this.windAmp = 0.2 + Math.random() * 0.6;
      this.armLength = this.size * (0.6 + Math.random() * 0.4);
      this.armWidth = 0.5 + Math.random() * 0.8;
    }
    update() {
      this.x += this.speedX + Math.sin(this.windPhase + this.y * 0.005) * this.windAmp * 0.15;
      this.y += this.speedY;
      this.rotation += this.rotSpeed;
      this.windPhase += 0.003;
      if (this.y > H + 20 || this.x < -30 || this.x > W + 30) {
        this.reset(false);
      }
    }
    draw(ctx) {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rotation);
      ctx.globalAlpha = this.opacity;

      const s = this.size;
      const arm = this.armLength;
      const w = this.armWidth;

      ctx.strokeStyle = 'rgba(240, 245, 255, 0.9)';
      ctx.fillStyle = 'rgba(240, 245, 255, 0.7)';
      ctx.lineWidth = w;

      // 六角星形雪花
      for (let i = 0; i < 6; i++) {
        const angle = (i * Math.PI) / 3;
        const cosA = Math.cos(angle);
        const sinA = Math.sin(angle);

        // 主臂
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(cosA * arm, sinA * arm);
        ctx.stroke();

        // 小分支 (让雪花更晶体感)
        const branchAngle1 = angle + 0.4;
        const branchAngle2 = angle - 0.4;
        const branchLen = arm * 0.4;
        const midX = cosA * arm * 0.5;
        const midY = sinA * arm * 0.5;

        ctx.beginPath();
        ctx.moveTo(midX, midY);
        ctx.lineTo(midX + Math.cos(branchAngle1) * branchLen, midY + Math.sin(branchAngle1) * branchLen);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(midX, midY);
        ctx.lineTo(midX + Math.cos(branchAngle2) * branchLen, midY + Math.sin(branchAngle2) * branchLen);
        ctx.stroke();

        // 第二个小分支 (靠近尖端)
        const tipX = cosA * arm * 0.8;
        const tipY = sinA * arm * 0.8;
        const tipBranchLen = arm * 0.25;

        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX + Math.cos(branchAngle1) * tipBranchLen, tipY + Math.sin(branchAngle1) * tipBranchLen);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(tipX, tipY);
        ctx.lineTo(tipX + Math.cos(branchAngle2) * tipBranchLen, tipY + Math.sin(branchAngle2) * tipBranchLen);
        ctx.stroke();
      }

      // 中心亮核
      ctx.beginPath();
      ctx.arc(0, 0, s * 0.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
      ctx.fill();

      ctx.restore();
    }
  }

  /* ─── 初始化雪花 ─── */
  function initSnow() {
    flakes = [];
    for (let i = 0; i < SNOW_COUNT; i++) {
      flakes.push(new Flake());
    }
  }
  initSnow();

  /* ─── 绘制 ─── */
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // 背景微光
    ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
    ctx.fillRect(0, 0, W, H);

    // 绘制雪花 (从大到小，让小的在更上层)
    const sorted = [...flakes].sort((a, b) => a.size - b.size);
    for (const f of sorted) {
      f.draw(ctx);
      f.update();
    }

    requestAnimationFrame(draw);
  }

  draw();

  // 窗口重置时重设位置
  window.addEventListener('resize', () => {
    for (const f of flakes) {
      f.x = Math.min(f.x, W);
      f.y = Math.min(f.y, H);
    }
  });

})();
</script>

</body>
</html>
